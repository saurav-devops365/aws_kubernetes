apiVersion: apps/v1
kind: Deployment
metadata:
  name: offerwall-backend-deployment
  namespace: growdeck
spec:
  replicas: 5

  selector:
    matchLabels:
      app: backend-offerwall

  template:
    metadata:
      labels:
        app: backend-offerwall

    spec:
      containers:
        - name: backend-offerwall
          image: affiefly/offerwall-backend-prod:v0.71
          imagePullPolicy: Always
          command: ["node"]
          args: ["offerwall.server.js"]
          envFrom:
            - secretRef:
                name: backend-offerwall-secret

          env:
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_PORT
              value: "6379"

          ports:
            - containerPort: 5000

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: backend-offerwall-service
  namespace: growdeck
  labels:
    app: backend-offerwall
spec:
  selector:
    app: backend-offerwall
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-offerwall-hpa
  namespace: growdeck
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: offerwall-backend-deployment  # ✅ Fixed: matches Deployment metadata.name
  minReplicas: 5
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80