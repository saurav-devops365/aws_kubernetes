apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend_offerwall-hpa
  namespace: growdeck
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend_offerwall-deployment
  minReplicas: 5
  maxReplicas: 30
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80 # Scale up if CPU usage exceeds 75%
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
