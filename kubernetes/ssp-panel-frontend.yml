apiVersion: apps/v1
kind: Deployment
metadata:
  name: ssp-panel-frontend-deployment
  namespace: growdeck
  labels:
    app: ssp-panel-frontend
spec:
  replicas: 2 # HPA will handle scaling
  selector:
    matchLabels:
      app: ssp-panel-frontend
  template:
    metadata:
      labels:
        app: ssp-panel-frontend
    spec:
      containers:
      - name: ssp-panel-frontend
        image: affiefly/ssp-panel-frontend-prod:v0.5
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m" # Minimum guaranteed CPU
            memory: "128Mi" # Minimum guaranteed RAM
          limits:
            cpu: "500m" # Max CPU per pod
            memory: "512Mi" # Max RAM per pod
---
apiVersion: v1
kind: Service
metadata:
  name: ssp-panel-frontend-service
  namespace: growdeck
spec:
  selector:
    app: ssp-panel-frontend
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ssp-panel-frontend-hpa
  namespace: growdeck
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ssp-panel-frontend-deployment
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30 # Reduce delay in scaling up
      policies:
      - type: Percent
        value: 50
        periodSeconds: 15 # Allow 50% increase every 15s
    scaleDown:
      stabilizationWindowSeconds: 80 # Prevent rapid scale down
      policies:
      - type: Percent
        value: 20
        periodSeconds: 30 # Allow 20% decrease every 30s
