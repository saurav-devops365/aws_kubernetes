
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: growoduck
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend-deployment
  minReplicas: 5
  maxReplicas: 200
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30 # Reduce delay in scaling up
      policies:
      - type: Percent
        value: 50
        periodSeconds: 15 # Allow 50% increase every 15s
    scaleDown:
      stabilizationWindowSeconds: 60 # Prevent rapid scale down
      policies:
      - type: Percent
        value: 20
        periodSeconds: 30 # Allow 20% decrease every 30s
