---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-backend-deployment
  namespace: growdeck
  labels:
    app: analytics-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-backend
  template:
    metadata:
      labels:
        app: analytics-backend
    spec:
      containers:
      - name: analytics-backend
        image: affiefly/analytics-backend-prod:v0.8
        imagePullPolicy: Always
        envFrom:
          - secretRef:
              name: backend-analytics-secret
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "3000m"

