apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: growdeck
spec:
  replicas: 5

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend
          image: affiefly/offerwall-backend-prod:v0.154
          imagePullPolicy: Always

          command: ["node"]
          args:
            - "--import"
            - "./instrumentation.mjs"
            - "app.js"

          envFrom:
            - secretRef:
                name: backend-offerwall-secret

          env:
            - name: REDIS_HOST
              value: redis-service

            - name: REDIS_PORT
              value: "6379"

            - name: OTEL_SERVICE_NAME
              value: backend-service

            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-opentelemetry-collector.monitoring.svc.cluster.local:4318

            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf

            - name: OTEL_TRACES_EXPORTER
              value: otlp

            - name: OTEL_METRICS_EXPORTER
              value: otlp

            - name: OTEL_LOGS_EXPORTER
              value: otlp

            - name: NODE_ENV
              value: production

          ports:
            - containerPort: 5000

          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: growdeck
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: growdeck
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-deployment  # ✅ Fixed: matches Deployment metadata.name
  minReplicas: 5
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
