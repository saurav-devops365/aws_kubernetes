---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-offerwall-deployment
  namespace: growdeck
  labels:
    app: backend-offerwall
spec:
  replicas: 5
  selector:
    matchLabels:
      app: backend-offerwall
  template:
    metadata:
      labels:
        app: backend-offerwall
    spec:
      containers:
      - name: backend-offerwall
        image: affiefly/offerwall-backend-prod:v0.1
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "6Gi"
            cpu: "3000m"

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 5

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: growdeck
  labels:
    app: backend-offerwall
spec:
  selector:
    app: backend-offerwall
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-offerwall-hpa
  namespace: growdeck
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-offerwall-deployment
  minReplicas: 5
  maxReplicas: 30
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80 # Scale up if CPU usage exceeds 75%
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80






