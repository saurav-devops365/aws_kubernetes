---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend_offerwall-deployment
  namespace: growdeck
  labels:
    app: backend_offerwall
spec:
  replicas: 5
  selector:
    matchLabels:
      app: backend_offerwall
  template:
    metadata:
      labels:
        app: backend_offerwall
    spec:
      containers:
      - name: backend_offerwall
        image: growdeck/backend_offerwall-backend-prod:v0.1ud
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "6Gi"
            cpu: "3000m"

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 5

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: growdeck
  labels:
    app: backend_offerwall
spec:
  selector:
    app: backend_offerwall
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
  type: ClusterIP





